name: Generate GitHub Stats

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-assets
  cancel-in-progress: false

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create assets folder
        run: mkdir -p assets/generated

      - name: Download top languages card
        run: |
          curl -L "https://github-readme-stats-sigma-five.vercel.app/api/top-langs/?username=anasemadanas&layout=compact&theme=dark" -o assets/generated/top-langs.svg

      - name: Commit and push stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/generated/top-langs.svg

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update GitHub stats [skip ci]"

          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            git push origin main && exit 0
            sleep 5
          done

          exit 1
