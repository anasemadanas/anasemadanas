name: Generate GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Download top languages card
        run: |
          curl -L "https://github-readme-stats-sigma-five.vercel.app/api/top-langs/?username=anasemadanas&layout=compact&theme=dark" -o assets/top-langs.svg

      - name: Download streak stats
        run: |
          curl -L "https://github-readme-streak-stats.herokuapp.com/?user=anasemadanas&theme=dark" -o assets/streak.svg

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "Update GitHub stats" || exit 0
          git push