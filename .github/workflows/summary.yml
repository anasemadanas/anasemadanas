name: Generate Profile Summary

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-assets
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create assets folder
        run: mkdir -p assets/generated

      - name: Download profile summary card
        run: |
          curl -L "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=anasemadanas&theme=github_dark" -o assets/generated/profile-details.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/generated/profile-details.svg

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update profile summary [skip ci]"

          git pull --rebase origin main
          git push origin main
