name: Generate GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: update-readme-assets
  cancel-in-progress: false

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create assets folder
        run: mkdir -p assets

      - name: Download top languages card
        run: |
          curl -L "https://github-readme-stats-sigma-five.vercel.app/api/top-langs/?username=anasemadanas&layout=compact&theme=dark" -o assets/top-langs.svg

      - name: Download streak stats
        run: |
          curl -L "https://github-readme-streak-stats.herokuapp.com/?user=anasemadanas&theme=dark" -o assets/streak.svg

      - name: Commit and push stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/top-langs.svg assets/streak.svg

          git diff --cached --quiet && exit 0

          git commit -m "Update GitHub stats"

          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            git push origin main && exit 0
            sleep 5
          done

          exit 1
